        <input class="inpet-one" type="text" name="name" placeholder="Имя" required>

      <label>
        <div class="name-colon">Ваш возраст</div>
        <input class="inpet-one" type="number" name="date" placeholder="Возраст" required>
      </label>
      <label>
        <div class="name-colon">Ваш номер телефона</div>
        <input class="inpet-one" type="tel" name="tel" inputmode="tel" placeholder="Номер телефона" required>
      </label>
      <label>
        <div class="name-colon">Ваша почта</div>
        <input class="inpet-one" type="email" name="email" inputmode="email" placeholder="Почта" required>
      </label>
    </fieldset>
    <fieldset class="fielsend-two">
          <h2 class="title-h2">Сообщение</h2>
        <textarea name="textarea" id="" placeholder="Ваше обращение" required></textarea>
      <div><input id="check" type="checkbox" name="sogl" required value="imd"> <div class="check-text">Я принимаю правила</div></div>
      <button class="send">Отправить</button>
    </fieldset>
  </form>
